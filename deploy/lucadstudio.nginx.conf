server {
    listen 80;
    listen [::]:80;
    server_name lucadstudio.com www.lucadstudio.com;

    access_log /var/log/nginx/arqgen-access.log;
    error_log  /var/log/nginx/arqgen-error.log;

    location /static/ {
        alias /var/www/arqgen/frontend/static/;
        expires 30d;
        add_header Cache-Control public;
    }

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 20M;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name lucadstudio.com www.lucadstudio.com;

    ssl_certificate     /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    access_log /var/log/nginx/arqgen-access.log;
    error_log  /var/log/nginx/arqgen-error.log;

    # Archivos estaticos servidos directamente por nginx
    location /static/ {
        alias /var/www/arqgen/frontend/static/;
        expires 30d;
        add_header Cache-Control public;
    }

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 20M;
    }
}
